<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>
  {% if page.title %}
    {{ page.title }} | Saif Way Technology
  {% else %}
    Saif Way Technology | Cybersecurity, Infrastructure & Automation Portfolio
  {% endif %}
</title>

<meta name="description" content="{{ page.description | default: site.description | strip_newlines }}">
{% if page.keywords %}
<meta name="keywords" content="{{ page.keywords }}">
{% endif %}
<meta name="author" content="Imran Sarwar">
<meta name="robots" content="{{ page.robots | default: 'index, follow' }}">

<link rel="canonical" href="{{ site.url }}{{ page.url | replace:'index.html','' }}">

<!-- Favicon -->
<link rel="icon" href="{{ '/assets/images/swt-icon.png' | relative_url }}" type="image/png">
<link rel="shortcut icon" href="{{ '/assets/images/swt-icon.png' | relative_url }}" type="image/png">

<!-- Open Graph -->
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description | strip_newlines }}">
<meta property="og:image" content="{{ site.url }}/assets/images/og-image.JPG">
<meta property="og:url" content="{{ site.url }}{{ page.url }}">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Saif Way Technology">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.description | default: site.description | strip_newlines }}">
<meta name="twitter:image" content="{{ site.url }}/assets/images/og-image.JPG">

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

<!-- Custom CSS -->
<link href="{{ '/assets/css/style.css' | relative_url }}" rel="stylesheet" />

<!-- Structured Data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "Imran Sarwar",
  "url": "{{ site.url }}",
  "image": "{{ site.url }}/assets/images/pf.png",
  "jobTitle": "IT Infrastructure and NOC/DC Operations Professional",
  "worksFor": {
    "@type": "Organization",
    "name": "Saif Way Technology"
  },
  "knowsAbout": [
    "Cybersecurity",
    "Network Automation",
    "Python",
    "Flask",
    "Linux Server Administration",
    "Windows Server Administration",
    "PKI",
    "SSL Certificates",
    "Machine Learning Based Intrusion Detection",
    "Natural Language Processing",
    "Text-Based Emotion Recognition",
    "Cloud IAM",
    "Cisco Networking",
    "DevNet",
    "OpenStack Keystone"
  ],
  "sameAs": [
    "https://www.linkedin.com/in/imransarwaritpro/",
    "https://github.com/Imran5693",
    "https://www.youtube.com/@SaifWayTech"
  ]
}
</script>
